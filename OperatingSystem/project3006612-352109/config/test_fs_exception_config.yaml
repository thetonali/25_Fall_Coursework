# Linux 系统异常检测工具 - 文件系统异常测试日志配置文件

# 日志文件源（只使用 FS 异常测试日志）
log_sources:
  - test_logs/test_fs_exception.log

# 监控间隔（秒）
monitor_interval: 5

# 检测规则配置
rules:
  # FS Exception (文件系统异常)
  fs_exception:
    patterns:
      - 'EXT4-fs error'
      - 'XFS.*error'
      - 'I/O error.*dev'
      - 'Read-only file system'
      - 'filesystem read-only'
      - 'Remounting filesystem read-only'
      - 'filesystem error'
      - 'BTRFS error'
    severity: high
    description: 文件系统异常
