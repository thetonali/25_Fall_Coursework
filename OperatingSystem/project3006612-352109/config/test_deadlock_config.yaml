# Linux 系统异常检测工具 - Deadlock 测试日志配置文件

# 日志文件源（只使用 Deadlock 测试日志）
log_sources:
  - test_logs/test_deadlock.log

# 监控间隔（秒）
monitor_interval: 5

# 检测规则配置
rules:
  # Deadlock (进程死锁)
  deadlock:
    patterns:
      - 'possible deadlock'
      - 'INFO: task .* blocked for more than'
      - 'hung_task_timeout_secs'
      - 'Task .* blocked for more than \d+ seconds'
    severity: high
    description: 进程死锁
