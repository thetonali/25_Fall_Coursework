# Linux 系统异常检测工具 - OOM 测试日志配置文件

# 日志文件源（只使用 OOM 测试日志）
log_sources:
  - test_logs/test_oom.log

# 监控间隔（秒）
monitor_interval: 5

# 检测规则配置
rules:
  # OOM (内存不足)
  oom:
    patterns:
      - 'Out of memory'
      - 'Kill process \d+ \(.*\) score'
      - 'oom-killer'
      - 'Killed process \d+'
    severity: critical
    description: 内存不足(OOM)
